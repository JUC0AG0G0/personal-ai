version: "3.9"

services:
  backend:
    build: ./backend
    container_name: personal_ai_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    restart: unless-stopped
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434

  frontend:
    build: ./frontend
    container_name: personal_ai_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    restart: unless-stopped

  ollama:
    build: ./ollama
    container_name: personal_ai_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
